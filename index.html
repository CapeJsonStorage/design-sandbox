<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Sandbox</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --nav-h: 56px;
    --accent: #6366f1;
    --bg: #0f0f11;
    --nav-bg: rgba(26,26,31,0.95);
    --nav-border: #27272f;
    --tab-hover: #202028;
    --tab-active-bg: #1a1a1f;
    --tab-active-border: #6366f1;
    --text: #f0f0f4;
    --text-muted: #888;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    overflow: hidden;
  }

  /* ── Top nav ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h);
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--nav-border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 8px;
  }

  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; color: var(--text);
    letter-spacing: -.3px; flex-shrink: 0; margin-right: 12px;
    text-decoration: none;
  }

  .nav-brand-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .nav-brand-mark svg { color: white; }

  .nav-tabs {
    display: flex; align-items: center; gap: 2px; flex: 1;
  }

  .nav-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 14px; border: none; background: transparent;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }

  .nav-tab svg { width: 15px; height: 15px; flex-shrink: 0; }

  .nav-tab:hover {
    background: var(--tab-hover); color: var(--text);
  }

  .nav-tab.active {
    background: #1c1d3a; color: #818cf8;
    font-weight: 600;
  }

  .nav-tab.active.orange { background: #271a0c; color: #fb923c; }
  .nav-tab.active.green  { background: #0c1f12; color: #4ade80; }
  .nav-tab.active.purple { background: #1c1d3a; color: #a78bfa; }

  .nav-right {
    margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }

  .nav-badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px; background: #1c1d3a; color: #818cf8;
    letter-spacing: .3px;
  }

  /* ── Iframe panels ── */
  .panels {
    position: fixed;
    top: var(--nav-h); left: 0; right: 0; bottom: 0;
  }

  .panel {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
    display: none;
    background: var(--bg);
  }

  .panel.active { display: block; }
  .panel iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* ── Mobile: collapse labels on narrow viewports ── */
  @media (max-width: 500px) {
    .nav-tab .tab-label { display: none; }
    .nav-tab { padding: 8px 10px; }
    .nav-brand span { display: none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="#" onclick="return false;">
    <div class="nav-brand-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <span>Design Sandbox</span>
  </a>

  <div class="nav-tabs">
    <button class="nav-tab purple" id="tab-projects" onclick="showTab('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="tab-label">Projects</span>
    </button>
    <button class="nav-tab active" id="tab-storyboard" onclick="showTab('storyboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      <span class="tab-label">Storyboard</span>
    </button>

    <button class="nav-tab orange" id="tab-htools" onclick="showTab('htools')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span class="tab-label">Higgsfield Tools</span>
    </button>

    <button class="nav-tab orange" id="tab-higgsfield" onclick="showTab('higgsfield')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span class="tab-label">Higgsfield Generator</span>
    </button>

    <button class="nav-tab" id="tab-krea" onclick="showTab('krea')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3L14.5 4z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      <span class="tab-label">Krea Generator</span>
    </button>
  </div>

  <div class="nav-right">
    <span class="nav-badge">v1.0</span>
  </div>
</nav>

<div class="panels">
  <div class="panel" id="panel-projects">
    <iframe src="projects-dashboard.html" title="Projects"></iframe>
  </div>
  <div class="panel active" id="panel-storyboard">
    <iframe src="storyboard-app.html" title="Storyboard"></iframe>
  </div>
  <div class="panel" id="panel-krea">
    <iframe src="docx_to_krea_v5.html" title="Krea Generator"></iframe>
  </div>
  <div class="panel" id="panel-higgsfield">
    <iframe src="higgsfield-generator.html" title="Higgsfield Generator" allow="clipboard-write"></iframe>
  </div>
  <div class="panel" id="panel-htools">
    <iframe src="higgsfield-tools.html" title="Higgsfield Tools"></iframe>
  </div>
</div>

<script>
const TABS = ['projects', 'storyboard', 'krea', 'higgsfield', 'htools'];

function showTab(name) {
  TABS.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
  history.replaceState(null, '', '#' + name);
  if (name === 'projects') _notifyDashboard();
}

// Restore tab from URL hash on load
(function() {
  const hash = location.hash.replace('#', '');
  if (TABS.includes(hash)) showTab(hash);
})();

// ── Auth ─────────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(location.search);
  const tok = params.get('token');
  if (tok) {
    localStorage.setItem('dsAuthToken', tok);
    history.replaceState(null, '', location.pathname + (location.hash || ''));
  }
  if (!localStorage.getItem('dsAuthToken')) {
    document.body.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
                  justify-content:center;font-family:-apple-system,sans-serif;background:#f0f0f2;gap:20px">
        <div style="background:#fff;border:1px solid #e2e2e6;border-radius:14px;padding:40px 48px;
                    text-align:center;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)">
          <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
                      display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </div>
          <h2 style="font-size:18px;font-weight:700;margin:0 0 6px;color:#111">Design Sandbox</h2>
          <p style="font-size:13px;color:#888;margin:0 0 24px;line-height:1.6">
            Sign in with your @capecreative.co Google account to continue.
          </p>
          <a href="/auth/google" style="display:inline-flex;align-items:center;gap:10px;
             background:#4285f4;color:#fff;text-decoration:none;padding:11px 20px;
             border-radius:8px;font-size:14px;font-weight:600;letter-spacing:.01em">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/>
            </svg>
            Sign in with Google
          </a>
        </div>
      </div>`;
  }
})();

// ── API storage layer (replaces Supabase) ─────────────────
function _apiHeaders() {
  return { 'Content-Type': 'application/json',
           'Authorization': 'Bearer ' + localStorage.getItem('dsAuthToken') };
}

async function _dbSave(record) {
  const r = await fetch('/api/projects', {
    method: 'POST', headers: _apiHeaders(), body: JSON.stringify(record)
  });
  if (r.status === 401) { localStorage.removeItem('dsAuthToken'); location.reload(); }
}

async function _dbGetAll() {
  const r = await fetch('/api/projects', { headers: _apiHeaders() });
  if (r.status === 401) { localStorage.removeItem('dsAuthToken'); location.reload(); return []; }
  const rows = await r.json();
  return rows.map(row => ({ ...row, _key: row.id }));
}

async function _dbGetData(id) {
  const r = await fetch('/api/projects/' + id + '/data', { headers: _apiHeaders() });
  if (!r.ok) return null;
  const { data } = await r.json();
  return data;
}

async function _dbDelete(id) {
  await fetch('/api/projects/' + id, { method: 'DELETE', headers: _apiHeaders() });
}

function _notifyDashboard() {
  const f = document.querySelector('#panel-projects iframe');
  if (f) f.contentWindow.postMessage({ type: 'projects-updated' }, '*');
}

// Handle messages from generator iframes and the dashboard
window.addEventListener('message', async e => {
  const d = e.data;
  if (!d || !d.type) return;

  if (d.type === 'save-project') {
    const dataStr = typeof d.data === 'string' ? d.data : JSON.stringify(d.data);
    await _dbSave({
      source: d.source, fileType: d.fileType,
      name: (d.name || 'Untitled').replace(/\.docx$/i, ''),
      createdAt: new Date().toISOString(),
      size: new Blob([dataStr]).size, data: dataStr
    });
    _notifyDashboard();
  }

  if (d.type === 'get-projects') {
    const records = await _dbGetAll();
    e.source.postMessage({ type: 'projects-data', records }, '*');
  }

  if (d.type === 'delete-project') {
    await _dbDelete(d.id);
    _notifyDashboard();
  }

  if (d.type === 'get-project-data') {
    const data = await _dbGetData(d.id);
    e.source.postMessage({ type: 'project-data-response', id: d.id, data }, '*');
  }

  if (d.type === 'open-project') {
    let projectData = d.data;
    if (!projectData && d.id) projectData = await _dbGetData(d.id);
    if (!projectData) { console.error('Could not load project data'); return; }
    const tab = d.source;
    showTab(tab);
    const panelIframe = document.querySelector('#panel-' + tab + ' iframe');
    if (!panelIframe) return;
    if (d.fileType === '.js') {
      try { await navigator.clipboard.writeText(projectData); }
      catch (_) {
        const ta = document.createElement('textarea');
        ta.value = projectData; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      panelIframe.contentWindow.postMessage({ type: 'script-copied' }, '*');
    } else {
      const send = () => panelIframe.contentWindow.postMessage({ type: 'load-project', data: projectData }, '*');
      if (panelIframe.contentDocument?.readyState === 'complete') send();
      else panelIframe.addEventListener('load', send, { once: true });
    }
  }
});
</script>
</body>
</html>
