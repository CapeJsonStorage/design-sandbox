<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higgsfield Tools</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11;
    --card: #1a1a1f;
    --card-border: #27272f;
    --card-hover: #202028;
    --text: #f0f0f4;
    --text-muted: #888;
    --text-dim: #444;
    --orange: #f97316;
    --orange-bg: #271a0c;
    --orange-dim: #3d2510;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  body { padding: 36px 32px; overflow-y: auto; }

  .top { margin-bottom: 32px; }
  .top h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
  .top p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    transition: background .15s, border-color .15s, transform .1s;
  }
  .link-card:hover {
    background: var(--card-hover);
    border-color: var(--orange);
    transform: translateY(-1px);
  }

  .link-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 10px;
    background: var(--orange-bg);
    border: 1px solid var(--orange-dim);
    display: flex; align-items: center; justify-content: center;
    color: var(--orange);
  }

  .link-body { min-width: 0; }
  .link-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .link-url {
    font-size: 11px; color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: monospace;
  }

  .link-arrow { margin-left: auto; color: var(--text-dim); flex-shrink: 0; transition: color .15s; }
  .link-card:hover .link-arrow { color: var(--orange); }
</style>
</head>
<body>

<div class="top">
  <h1>Higgsfield Tools</h1>
  <p>Node templates — click to open in Higgsfield</p>
</div>

<div class="grid" id="grid"></div>

<script>
const tools = [
  { name: 'Character Creator',      url: 'https://higgsfield.ai/s/arkafNNvNwI' },
  { name: 'Image from Moodboard',   url: 'https://higgsfield.ai/s/ZbpWaS2Y1k4' },
  { name: 'Shot Creator',           url: 'https://higgsfield.ai/s/sbxeY9WvoX8' },
  { name: 'Docx to Prompts',        url: 'https://higgsfield.ai/s/YvYRGfuo88U' },
  { name: 'Test Models',            url: 'https://higgsfield.ai/s/tqB0RUtIz2Q' },
];

const iconSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
const arrowSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

document.getElementById('grid').innerHTML = tools.map(t => `
  <a class="link-card" href="${t.url}" target="_blank" rel="noopener">
    <div class="link-icon">${iconSVG}</div>
    <div class="link-body">
      <div class="link-name">${t.name}</div>
      <div class="link-url">${t.url}</div>
    </div>
    <span class="link-arrow">${arrowSVG}</span>
  </a>`).join('');
</script>
</body>
</html>
