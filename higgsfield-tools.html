<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higgsfield Tools</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11;
    --card: #1a1a1f;
    --card-border: #27272f;
    --card-hover: #202028;
    --text: #f0f0f4;
    --text-muted: #888;
    --text-dim: #444;
    --orange: #f97316;
    --orange-bg: #271a0c;
    --orange-dim: #3d2510;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  body { padding: 32px 28px; overflow-y: auto; }

  /* ── Header ── */
  .top { margin-bottom: 28px; }
  .top h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
  .top p  { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

  /* ── Grid: fixed 3-up on wide, 2-up on medium, 1-up on narrow ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── Tool card ── */
  .tool-card {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    background: var(--card);
    transition: border-color .15s, transform .12s, box-shadow .15s;
    cursor: pointer;
  }
  .tool-card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(249,115,22,.12);
  }

  /* ── Thumbnail ── */
  .tool-thumb-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #111115;
    position: relative;
    flex-shrink: 0;
  }
  .tool-thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .3s ease;
  }
  .tool-card:hover .tool-thumb-wrap img {
    transform: scale(1.03);
  }

  /* ── Footer strip ── */
  .tool-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    border-top: 1px solid var(--card-border);
    background: var(--card);
    gap: 10px;
    flex-shrink: 0;
  }
  .tool-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tool-arrow {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--orange-bg);
    color: var(--orange);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .12s, border-color .12s;
  }
  .tool-card:hover .tool-arrow {
    background: var(--orange-dim);
    border-color: var(--orange);
  }
</style>
</head>
<body>

<div class="top">
  <h1>Higgsfield Tools</h1>
  <p>Node templates — click any tile to open in Higgsfield</p>
</div>

<div class="grid" id="grid"></div>

<script>
const tools = [
  { name: 'Character Creator',            url: 'https://higgsfield.ai/s/arkafNNvNwI', thumb: 'Chararcter_Creator_Thumb_v01.png' },
  { name: 'Image from Moodboard',         url: 'https://higgsfield.ai/s/ZbpWaS2Y1k4', thumb: 'Image from Moodboard_Thumb_v01.png' },
  { name: 'Shot Creator',                 url: 'https://higgsfield.ai/s/sbxeY9WvoX8', thumb: 'Shot Creator_Thumb_v01.png' },
  { name: 'Docx to Prompts',              url: 'https://higgsfield.ai/s/YvYRGfuo88U', thumb: 'Docx to prompts_Thumb_v01.png' },
  { name: 'Test Models',                  url: 'https://higgsfield.ai/s/tqB0RUtIz2Q', thumb: 'Test Models_Thumb_v01.png' },
  { name: 'Video Sequence from Elements', url: 'https://higgsfield.ai/s/QyU0k2W2GUU', thumb: 'Video Sequence from ELements_Thumb_v01.png' },
  { name: 'Angles from Image',            url: 'https://higgsfield.ai/s/OmEIKNJ4CDA', thumb: 'Angles from image_Thumb_v01.png' },
  { name: 'Variations from Image',        url: 'https://higgsfield.ai/s/OEptE3RoqwY', thumb: 'Variations from Image_Thumb_v01.png' },
];

const arrowSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

document.getElementById('grid').innerHTML = tools.map(t => `
  <a class="tool-card" href="${t.url}" target="_blank" rel="noopener">
    <div class="tool-thumb-wrap">
      <img src="/thumbnails/${encodeURIComponent(t.thumb)}" alt="${t.name}" loading="lazy">
    </div>
    <div class="tool-footer">
      <span class="tool-name">${t.name}</span>
      <span class="tool-arrow">${arrowSVG}</span>
    </div>
  </a>`).join('');
</script>
</body>
</html>
